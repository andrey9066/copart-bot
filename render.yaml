services:
  - type: worker
    name: copart-bot
    runtime: image
    image:
      url: docker.io/library/python:3.12
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: CHECK_INTERVAL_MINUTES
        value: "15"
      - key: PYTHON_VERSION
        value: "3.12"
    startCommand: pip install playwright==1.49.1 && playwright install chromium && python bot.py
    autoDeploy: false
